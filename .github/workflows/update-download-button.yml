name: Update Download Button

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Get latest release tag
        id: latest
        uses: InsonusK/get-latest-release@v1.0.1
        with:
          myToken: ${{ github.token }}
          view_top: 1

      - name: Checkout main
        run: git checkout main

      - name: Update download button in README
        env:
          GITHUB_USER: "Bxnny24"
          REPO: "RL-File-Switcher-releases"
          VERSION: "${{ steps.latest.outputs.tag_name }}"
          ASSET: "RLFileSwitcher-win-Setup.exe"
          BEGIN_TAG: "<!-- BEGIN LATEST DOWNLOAD BUTTON -->"
          END_TAG: "<!-- END LATEST DOWNLOAD BUTTON -->"
        run: |
          BLOCK="[![Download](https://img.shields.io/badge/Download-RLFileSwitcher_${{ env.VERSION }}-0d6efd?style=for-the-badge&logo=windows&logoColor=white)](https://github.com/${{ env.GITHUB_USER }}/${{ env.REPO }}/releases/latest/download/${{ env.ASSET }})

          ![Platform](https://img.shields.io/badge/platform-Windows_10%2F11-lightgrey?style=flat-square&logo=windows)
          ![Version](https://img.shields.io/badge/version-${{ env.VERSION }}-0d6efd?style=flat-square)"

          UPDATE=$(perl -0777 -pe \
            "s#(\Q${{ env.BEGIN_TAG }}\E)(?:.|\n)*?(\Q${{ env.END_TAG }}\E)#\${1}\n${BLOCK}\n\${2}#g" \
            README.md)
          echo "${UPDATE}" > README.md

      - uses: EndBug/add-and-commit@v9
        with:
          message: "docs: bump download button to ${{ steps.latest.outputs.tag_name }}"
          default_author: github_actions
