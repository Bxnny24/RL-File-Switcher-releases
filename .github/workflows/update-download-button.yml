name: Update Download Button

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get latest release tag
        id: latest
        uses: InsonusK/get-latest-release@v1.0.1
        with:
          myToken: ${{ github.token }}
          view_top: 1

      - name: Update download button in README
        env:
          GITHUB_USER: "Bxnny24"
          REPO: "RL-File-Switcher-releases"
          VERSION: "${{ steps.latest.outputs.tag_name }}"
          ASSET: "RLFileSwitcher-win-Setup.exe"
          COLOR: "blue"
          BEGIN_TAG: "<!-- BEGIN LATEST DOWNLOAD BUTTON -->"
          END_TAG: "<!-- END LATEST DOWNLOAD BUTTON -->"
        run: |
          UPDATE=$(cat README.md | perl -0777 -pe \
            's#(${{ env.BEGIN_TAG }})(?:.|\n)*?(${{ env.END_TAG }})#${1}\n[![Download ${{ env.VERSION }}](https://custom-icon-badges.demolab.com/badge/-Download_${{ env.VERSION }}-${{ env.COLOR }}?style=for-the-badge\&logo=download\&logoColor=white)](https://github.com/${{ env.GITHUB_USER }}/${{ env.REPO }}/releases/download/${{ env.VERSION }}/${{ env.ASSET }})\n${2}#g')
          echo "${UPDATE}" > README.md

      - uses: EndBug/add-and-commit@v9
        with:
          message: "docs: bump download button to ${{ steps.latest.outputs.tag_name }}"
          default_author: github_actions
          branch: main
